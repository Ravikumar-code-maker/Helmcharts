apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-app   # Dynamic name
spec:
  replicas: {{ .Values.replicaCount }}   # From values.yaml
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
        - name: app-container
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 80
